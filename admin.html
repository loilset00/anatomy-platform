<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Администратор</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container">

<h2 class="mt-3">Администратор</h2>

<!-- СТАТИСТИКА -->
<div class="card p-3 mb-3">
<h5>Статистика</h5>
<p>Модели: <b id="countModels">0</b></p>
<p>Пользователи: <b id="countUsers">0</b></p>
</div>

<a href="create.html" class="btn btn-dark mb-3">Добавить модель</a>

<!-- МОДЕЛИ -->
<h4>Модели</h4>
<table class="table table-bordered">
<thead>
<tr>
<th>Название</th>
<th>Описание</th>
<th>Ключевые слова</th>
<th>Действия</th>
</tr>
</thead>
<tbody id="models"></tbody>
</table>

<!-- ПОЛЬЗОВАТЕЛИ -->
<h4>Пользователи</h4>
<table class="table table-bordered">
<thead>
<tr>
<th>Email</th>
<th>Роль</th>
<th></th>
</tr>
</thead>
<tbody id="users"></tbody>
</table>

<!-- КОММЕНТАРИИ -->
<h4>Комментарии</h4>
<table class="table table-bordered">
<thead>
<tr>
<th>Пользователь</th>
<th>Модель</th>
<th>Комментарий</th>
<th></th>
</tr>
</thead>
<tbody id="commentsAdmin"></tbody>
</table>

<a href="index.html" class="btn btn-danger">Выйти</a>

<script type="module" src="admin.js"></script>

</body>
</html>
