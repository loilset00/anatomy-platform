<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Настройки</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container">

<h2 class="mt-4">⚙ Настройки</h2>

<div class="card p-4 mt-3">

<label class="form-label">Тема интерфейса</label>
<select id="theme" class="form-control">
<option value="light">Светлая</option>
<option value="dark">Тёмная</option>
</select>

<label class="form-label mt-3">Уровень детализации</label>
<select id="detail" class="form-control">
<option value="low">Низкий</option>
<option value="medium">Средний</option>
<option value="high">Высокий</option>
</select>

<label class="form-label mt-3">Скорость анимации</label>
<input type="range" id="speed" min="1" max="10" class="form-range">

<div class="form-check mt-3">
<input type="checkbox" id="labels" class="form-check-input">
<label class="form-check-label">
Показывать подписи анатомических элементов
</label>
</div>

<button id="saveBtn" class="btn btn-primary mt-4">
Сохранить настройки
</button>

<a href="app.html" class="btn btn-secondary mt-2">
Назад
</a>

</div>

<script src="settings.js"></script>

</body>
</html>
