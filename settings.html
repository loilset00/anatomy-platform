<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title data-i18n="settings">Settings</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container">

<h2 class="mt-4" data-i18n="settings">Settings</h2>

<div class="card p-4 mt-3">

<label class="form-label" data-i18n="theme">Theme</label>

<select id="theme" class="form-control">
<option value="light">Light</option>
<option value="dark">Dark</option>
</select>

<label class="form-label mt-3" data-i18n="language">Language</label>

<select id="language" class="form-control">
<option value="ru">Русский</option>
<option value="en">English</option>
</select>

<button onclick="saveSettings()" class="btn btn-primary mt-4">
Save settings
</button>

<button onclick="history.back()" class="btn btn-secondary mt-2" data-i18n="back">
Back
</button>

</div>

<script src="i18n.js"></script>
<script src="settings.js"></script>

</body>
</html>
