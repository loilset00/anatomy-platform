<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title data-i18n="title">3D Anatomy Platform</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container">

<h2 class="mt-4" data-i18n="title">3D Anatomy Platform</h2>

<div class="mt-3">

<a href="settings.html" class="btn btn-secondary">Settings</a>
<a href="index.html" class="btn btn-danger">Logout</a>

</div>

<div class="card p-4 mt-4">

<h4>Select model</h4>

<select class="form-control">

<option>Skull</option>
<option>Spine</option>
<option>Hip Joint</option>
<option>Knee Joint</option>

</select>

<label class="form-label mt-3">Comment</label>

<textarea id="comment" class="form-control"></textarea>

<button onclick="saveComment()" class="btn btn-success mt-3">
Save comment
</button>

</div>

<div class="card p-4 mt-4">

<h5>Comments</h5>

<ul id="comments" class="list-group"></ul>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
