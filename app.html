<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D Платформа анатомии</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>


<body class="container">

<h2 class="mt-4">3D-платформа визуализации анатомии человека</h2>


<div class="mt-3 mb-3">

<a href="settings.html" class="btn btn-secondary">
⚙ Настройки
</a>

<a href="index.html" class="btn btn-danger">
Выйти
</a>

</div>


<div class="card p-4 mt-3">

<h4>Работа с анатомической моделью</h4>


<label class="form-label mt-3">Выберите модель</label>

<select id="model" class="form-control">

<option>Череп</option>
<option>Позвоночник</option>
<option>Тазобедренный сустав</option>
<option>Коленный сустав</option>

</select>


<label class="form-label mt-3">Комментарий / действие</label>

<textarea id="comment" class="form-control" placeholder="Введите комментарий"></textarea>


<button id="save" class="btn btn-success mt-3">
Сохранить действие
</button>


<div id="msg" class="mt-3 text-success"></div>

</div>


<div class="card p-4 mt-4">

<h5>История действий</h5>

<ul id="history" class="list-group"></ul>

</div>


<script src="app.js"></script>

</body>

</html>
