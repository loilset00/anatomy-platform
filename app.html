<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title data-i18n="title">3D Anatomy Platform</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container">

<h2 class="mt-4" data-i18n="title">
3D Anatomy Platform
</h2>

<div class="mt-3 mb-3">

<a href="settings.html" class="btn btn-secondary" data-i18n="settings">
Settings
</a>

<a href="index.html" class="btn btn-danger">
Logout
</a>

</div>

<div class="card p-4 mt-3">

<h4 data-i18n="model">
Select model
</h4>

<select id="model" class="form-control mt-2">

<option>Skull</option>
<option>Spine</option>
<option>Hip joint</option>
<option>Knee joint</option>

</select>

<label class="form-label mt-3" data-i18n="comment">
Comment
</label>

<textarea id="comment" class="form-control"></textarea>

<button id="save" class="btn btn-success mt-3" data-i18n="saveAction">
Save action
</button>

<div id="msg" class="mt-3 text-success"></div>

</div>

<div class="card p-4 mt-4">

<h5>
History
</h5>

<ul id="history" class="list-group"></ul>

</div>

<script src="i18n.js"></script>
<script src="app.js"></script>

</body>

</html>
