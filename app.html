<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D Анатомическая платформа</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container">

<h2 class="mt-4 text-center">3D Анатомическая платформа</h2>

<!-- КНОПКИ -->
<div class="d-flex justify-content-between mt-3">

<div>
<a href="settings.html" class="btn btn-secondary">Настройки</a>
</div>

<div>
<button onclick="logout()" class="btn btn-danger">Выйти</button>
</div>

</div>

<!-- ВЫБОР МОДЕЛИ -->
<div class="card p-4 mt-4">

<h4>Выбор 3D модели</h4>

<select id="model" class="form-control">

<option>Череп</option>
<option>Позвоночник</option>
<option>Тазобедренный сустав</option>
<option>Коленный сустав</option>

</select>

<label class="form-label mt-3">Комментарий</label>

<textarea id="comment" class="form-control"></textarea>

<button onclick="saveComment()" class="btn btn-success mt-3">
Сохранить комментарий
</button>

</div>

<!-- КОММЕНТАРИИ -->
<div class="card p-4 mt-4">

<h5>Комментарии</h5>

<ul id="comments" class="list-group"></ul>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
